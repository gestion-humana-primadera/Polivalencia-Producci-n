    function actualizarTemas() {
        const lineaSel   = document.getElementById('linea').value;
        const temaSelect = document.getElementById('tema');
        temaSelect.innerHTML = "";

        if (!lineaSel) {
            temaSelect.innerHTML = '<option value="">Seleccione primero la línea...</option>';
            temaSelect.disabled = true;
            return;
        }

        temaSelect.disabled = false;
        const opcionDefault = document.createElement('option');
        opcionDefault.value = "";
        opcionDefault.textContent = "Seleccione un tema...";
        temaSelect.appendChild(opcionDefault);

        catalogo[lineaSel].forEach(function(tema) {
            const opt = document.createElement('option');
            opt.value = tema;
            opt.textContent = tema;
            temaSelect.appendChild(opt);
        });
    }

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(function(s) { video.srcObject = s; video.play(); statusTxt.innerText = "Cámara activa"; })
        .catch(function() { statusTxt.innerText = "Cámara no disponible — usa Galería"; });

    function capturar() {
        const c = document.createElement('canvas');
        c.width = 640; c.height = 480;
        c.getContext('2d').drawImage(video, 0, 0, 640, 480);
        imagenB64 = c.toDataURL('image/jpeg', 0.5);
        preview.src = imagenB64;
        preview.style.display = "block";
        video.style.display = "none";
        statusTxt.innerText = "Evidencia capturada ✓";
    }

    function cargarImagen(e) {
        const r = new FileReader();
        r.onload = function() {
            imagenB64 = r.result;
            preview.src = r.result;
            preview.style.display = "block";
            video.style.display = "none";
            statusTxt.innerText = "Evidencia cargada ✓";
        };
        r.readAsDataURL(e.target.files[0]);
    }

    async function enviar() {
        const cedula      = document.getElementById('cedula').value.trim();
        const colaborador = document.getElementById('colaborador').value.trim();
        const linea       = document.getElementById('linea').value;
        const tema        = document.getElementById('tema').value;
        const duracion    = document.getElementById('duracion').value;

        if (!cedula || !colaborador || !linea || !tema || !duracion || !imagenB64) {
            alert("Por favor completa todos los campos y agrega la evidencia fotográfica.");
            return;
        }

        const payload = {
            token:        TOKEN,
            cedula:       cedula,
            colaborador:  colaborador,
            fecha:        new Date().toLocaleDateString('es-CO'),
            linea:        linea,
            tema:         tema,
            duracion_min: parseInt(duracion),
            imagen:       imagenB64
        };

        btnEnviar.disabled = true;
        statusTxt.innerText = "Sincronizando con Primadera...";

        try {
            const res = await fetch(FLOW_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("Registro guardado con exito.");
                location.reload();
            } else {
                throw new Error();
            }
        } catch(e) {
            alert("Error al guardar. Verifica tu conexion.");
            btnEnviar.disabled = false;
            statusTxt.innerText = "Error de sincronizacion.";
        }
    }
